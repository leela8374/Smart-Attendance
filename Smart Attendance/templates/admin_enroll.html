{% extends "base.html" %}
{% block title %}Enroll Student{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('admin.dashboard') }}" class="back-link">← Back</a>
    <h1 class="page-title">Enroll Student in Course</h1>
  </div>
</div>
<div class="card form-card">
  <form method="POST" action="{{ url_for('admin.enroll_page') }}">
    <div class="form-group">
      <label class="form-label">Select Student</label>
      <select name="student_id" class="form-input" required>
        <option value="">-- Select Student --</option>
        {% for s in students %}
        <option value="{{ s.user_id }}">{{ s.full_name }} ({{ s.username }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Select Course</label>
      <select name="course_id" class="form-input" required>
        <option value="">-- Select Course --</option>
        {% for c in courses %}
        <option value="{{ c.course_id }}">{{ c.course_name }} ({{ c.course_code }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Enroll Student</button>
      <a href="{{ url_for('admin.dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
