{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('admin.dashboard') }}" class="back-link">← Back</a>
    <h1 class="page-title">Add New User</h1>
  </div>
</div>
<div class="card form-card">
  <form method="POST" action="{{ url_for('admin.create_user_page') }}">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-input" placeholder="e.g. Ravi Kumar" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" placeholder="e.g. ravi2024" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-input" placeholder="e.g. ravi@college.edu" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select name="role" class="form-input" required>
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create User</button>
      <a href="{{ url_for('admin.dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
