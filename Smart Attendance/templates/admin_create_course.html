{% extends "base.html" %}
{% block title %}Add Course{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('admin.dashboard') }}" class="back-link">← Back</a>
    <h1 class="page-title">Add New Course</h1>
  </div>
</div>
<div class="card form-card">
  <form method="POST" action="{{ url_for('admin.create_course_page') }}">
    <div class="form-group">
      <label class="form-label">Course Name</label>
      <input type="text" name="course_name" class="form-input" placeholder="e.g. Data Structures" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Course Code</label>
      <input type="text" name="course_code" class="form-input" placeholder="e.g. CS301" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Assign Faculty</label>
      <select name="faculty_id" class="form-input" required>
        <option value="">-- Select Faculty --</option>
        {% for f in faculty_list %}
        <option value="{{ f.user_id }}">{{ f.full_name }} ({{ f.username }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Course</button>
      <a href="{{ url_for('admin.dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
